name: therapy_app
description: Wrist Flexion & Physical Therapy App

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Auth + DB
  supabase_flutter: ^2.5.0

  # Charts
  fl_chart: ^0.68.0

  # Local persistence (streak tracking)
  shared_preferences: ^2.2.3

  # WebSocket for flexion backend
  web_socket_channel: ^3.0.1

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
