<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Portal | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <div class="min-h-screen flex items-center justify-center p-4">
      <section class="w-full max-w-md rounded-2xl shadow-xl border border-slate-200 bg-white p-6 sm:p-8">
        <div class="text-center">
          <p class="text-sm font-semibold uppercase tracking-wider text-sky-600">CTS Doctor Portal</p>
          <h1 id="authTitle" class="mt-2 text-2xl font-bold">Sign in</h1>
          <p class="mt-1 text-sm text-slate-500">Secure access to patient rehab analytics.</p>
        </div>

        <form id="authForm" class="mt-8 space-y-4">
          <div id="fullNameWrap" class="hidden">
            <label for="fullName" class="block text-sm font-medium text-slate-700">Full name</label>
            <input id="fullName" type="text" class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-500" placeholder="Dr. Jane Smith" />
          </div>

          <div>
            <label for="email" class="block text-sm font-medium text-slate-700">Email</label>
            <input id="email" type="email" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-500" placeholder="doctor@clinic.com" />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
            <input id="password" type="password" required class="mt-1 w-full rounded-lg border border-slate-300 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-500" placeholder="••••••••" />
          </div>

          <p id="roleHint" class="hidden rounded-md bg-sky-50 px-3 py-2 text-xs text-sky-800">
            New accounts created here are marked as <strong>doctor</strong>.
          </p>

          <button id="authSubmitBtn" type="submit" class="w-full rounded-lg bg-sky-600 py-2.5 font-semibold text-white transition hover:bg-sky-700">Sign in</button>
        </form>

        <button id="toggleModeBtn" class="mt-4 w-full rounded-lg border border-slate-300 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">
          Need an account? Create one
        </button>

        <p id="msg" class="mt-4 hidden rounded-lg px-3 py-2 text-sm"></p>
      </section>
    </div>

    <script type="module" src="login.js"></script>
  </body>
</html>
