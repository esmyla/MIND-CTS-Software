<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Portal | Patients</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6">
        <div>
          <h1 class="text-xl font-bold text-slate-900">Patient Selection</h1>
          <p class="text-sm text-slate-500">Choose a patient to open their dashboard.</p>
        </div>
        <button id="logoutBtn" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium hover:bg-slate-50">Logout</button>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-4 py-6 sm:px-6">
      <div class="rounded-xl border border-slate-200 bg-white p-4 sm:p-6">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <h2 class="text-lg font-semibold">All Patients</h2>
          <input id="searchInput" type="text" placeholder="Search by UUID..." class="w-full sm:w-80 rounded-lg border border-slate-300 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-500" />
        </div>
        <p id="summary" class="mt-2 text-sm text-slate-500"></p>
        <div id="patientsGrid" class="mt-4 grid gap-3 sm:grid-cols-2 lg:grid-cols-3"></div>
        <p id="emptyState" class="mt-6 hidden rounded-lg bg-slate-50 p-4 text-sm text-slate-500">No patients found.</p>
      </div>
    </main>

    <script type="module" src="patients.js"></script>
  </body>
</html>
