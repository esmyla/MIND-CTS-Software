<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Doctor Portal | Patients</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-4 py-4 sm:px-6">
        <div>
          <h1 class="text-xl font-bold text-slate-900">Patient Selection</h1>
          <p class="text-sm text-slate-500">Search all patients by name and manage your assigned list.</p>
        </div>
        <button id="logoutBtn" class="rounded-lg border border-slate-300 px-3 py-2 text-sm font-medium hover:bg-slate-50">Logout</button>
      </div>
    </header>

    <main class="mx-auto max-w-6xl space-y-6 px-4 py-6 sm:px-6">
      <section id="setupNotice" class="hidden rounded-xl border border-amber-300 bg-amber-50 p-4 text-sm text-amber-900"></section>

      <section class="rounded-xl border border-slate-200 bg-white p-4 sm:p-6">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
          <h2 class="text-lg font-semibold">Search Entire Patient Directory</h2>
          <input id="searchInput" type="text" placeholder="Search by patient name, email, or UUID..." class="w-full sm:w-96 rounded-lg border border-slate-300 px-3 py-2 outline-none focus:ring-2 focus:ring-sky-500" />
        </div>
        <p id="summary" class="mt-2 text-sm text-slate-500"></p>
        <div id="allPatientsGrid" class="mt-4 grid gap-3 sm:grid-cols-2"></div>
        <p id="allEmptyState" class="mt-6 hidden rounded-lg bg-slate-50 p-4 text-sm text-slate-500">No matching patients found.</p>
      </section>

      <section class="rounded-xl border border-slate-200 bg-white p-4 sm:p-6">
        <h2 class="text-lg font-semibold">My Assigned Patients</h2>
        <p class="mt-1 text-sm text-slate-500">Only assigned patients can be opened in this doctor portal.</p>
        <div id="assignedGrid" class="mt-4 grid gap-3 sm:grid-cols-2"></div>
        <p id="assignedEmptyState" class="mt-6 hidden rounded-lg bg-slate-50 p-4 text-sm text-slate-500">No patients assigned yet.</p>
      </section>
    </main>

    <script type="module" src="patients.js"></script>
  </body>
</html>
